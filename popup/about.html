<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recall — About</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 380px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px; color: #111;
        background: #fff;
        padding: 24px 20px;
        display: flex; flex-direction: column; gap: 12px;
      }
      .logo {
        width: 40px; height: 40px;
        background: #111; color: #fff;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 20px; letter-spacing: -0.5px;
      }
      h2 { font-size: 16px; font-weight: 600; }
      p { font-size: 12px; color: #555; line-height: 1.6; }
      .version { font-size: 11px; color: #aaa; }
    </style>
  </head>
  <body>
    <div class="logo">R</div>
    <h2>Recall</h2>
    <p>Captures your AI conversations from Claude, ChatGPT, and Gemini as a portable memory layer — so your context travels with you across platforms.</p>
    <p class="version">Version 0.1.0</p>
  </body>
</html>
