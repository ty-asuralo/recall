<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recall — Conversations</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px; color: #111;
        background: #fff;
        overflow: hidden;
      }

      /* ── Layout ── */
      .shell {
        display: flex; flex-direction: column;
        width: 100%; height: 100%;
      }

      /* ── Header ── */
      .header {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #f0f0f0;
        flex-shrink: 0;
      }
      .header-logo {
        width: 26px; height: 26px;
        background: #111; color: #fff;
        border-radius: 5px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 13px;
        flex-shrink: 0;
      }
      .header-title { font-size: 14px; font-weight: 600; flex: 1; }

      /* ── Filter tabs ── */
      .filters {
        display: flex; gap: 2px;
        padding: 0 4px;
      }
      .filter-tab {
        padding: 4px 10px;
        border: none; background: none;
        font-size: 12px; color: #888;
        border-radius: 5px; cursor: pointer;
        white-space: nowrap;
        transition: background 0.1s, color 0.1s;
      }
      .filter-tab:hover { background: #f5f5f5; color: #333; }
      .filter-tab.active { background: #111; color: #fff; }
      .filter-tab .dot {
        display: inline-block; width: 6px; height: 6px;
        border-radius: 50%; margin-right: 5px; vertical-align: middle;
      }
      .dot-claude  { background: #D97757; }
      .dot-chatgpt { background: #10A37F; }
      .dot-gemini  { background: #4285F4; }

      /* ── Body (list + thread) ── */
      .body {
        display: flex; flex: 1; overflow: hidden;
      }

      /* ── Conversation list ── */
      .conv-list {
        width: 240px; flex-shrink: 0;
        border-right: 1px solid #f0f0f0;
        overflow-y: auto;
        padding: 4px 0;
      }
      .conv-list-empty {
        padding: 32px 16px;
        text-align: center; color: #bbb; font-size: 12px; line-height: 1.6;
      }
      .conv-item {
        padding: 9px 14px;
        cursor: pointer;
        border-left: 2px solid transparent;
        transition: background 0.1s;
      }
      .conv-item:hover { background: #fafafa; }
      .conv-item.selected {
        background: #f5f5f5;
        border-left-color: #111;
      }
      .conv-item-header {
        display: flex; align-items: center; gap: 6px; margin-bottom: 3px;
      }
      .conv-platform-dot {
        width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      }
      .conv-title {
        font-size: 12px; font-weight: 500; color: #111;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        flex: 1;
      }
      .conv-meta {
        font-size: 11px; color: #aaa;
        padding-left: 12px;
      }

      /* ── Thread panel ── */
      .thread {
        flex: 1; overflow-y: auto;
        padding: 16px;
        display: flex; flex-direction: column; gap: 2px;
      }
      .thread-empty {
        flex: 1;
        display: flex; align-items: center; justify-content: center;
        color: #ccc; font-size: 12px;
      }
      .thread-header {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 14px; padding-bottom: 12px;
        border-bottom: 1px solid #f0f0f0;
        flex-shrink: 0;
      }
      .thread-platform-dot {
        width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      }
      .thread-title {
        font-size: 13px; font-weight: 600; flex: 1;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .thread-msg-count { font-size: 11px; color: #aaa; }

      /* ── Message bubbles ── */
      .msg-row {
        display: flex;
        margin-bottom: 8px;
      }
      .msg-row.user { justify-content: flex-end; }
      .msg-row.assistant { justify-content: flex-start; }

      .msg-bubble {
        max-width: 78%;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 12px; line-height: 1.55;
        white-space: pre-wrap; word-break: break-word;
      }
      .msg-row.user .msg-bubble {
        background: #111; color: #fff;
        border-bottom-right-radius: 3px;
      }
      .msg-row.assistant .msg-bubble {
        background: #f5f5f5; color: #222;
        border-bottom-left-radius: 3px;
      }

      .msg-time {
        font-size: 10px; color: #bbb;
        margin-top: 3px;
        text-align: right;
      }
      .msg-row.assistant .msg-time { text-align: left; }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div class="header-logo">R</div>
        <div class="header-title">Conversations</div>
        <nav class="filters">
          <button class="filter-tab active" data-platform="all">All</button>
          <button class="filter-tab" data-platform="claude">
            <span class="dot dot-claude"></span>Claude
          </button>
          <button class="filter-tab" data-platform="chatgpt">
            <span class="dot dot-chatgpt"></span>ChatGPT
          </button>
          <button class="filter-tab" data-platform="gemini">
            <span class="dot dot-gemini"></span>Gemini
          </button>
        </nav>
      </header>

      <div class="body">
        <div class="conv-list" id="conv-list"></div>
        <div class="thread" id="thread">
          <div class="thread-empty">Select a conversation</div>
        </div>
      </div>
    </div>

    <script src="../dist/conversations.js"></script>
  </body>
</html>
